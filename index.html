<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LynxCrew</title>
    <style>
        /* Modern, dögös sötét dizájn neon kiemelésekkel */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e5e5e7;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('https://i.imgur.com/iYHuEey.jpeg?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            padding: 120px 20px 80px 20px;
        }
        h1 {
            color: #ff4500;
            font-size: 3.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
        }
        header p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 40px auto;
            color: #b3b3b3;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        h2 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            color: #fff;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 50px;
            border: 1px solid #222;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Közösségi média gombok szekciója */
        .social-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
            min-width: 180px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        /* Egyedi gomb színek */
        .btn-youtube {
            background-color: #ff0000;
        }
        .btn-youtube:hover {
            background-color: #cc0000;
        }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .btn-instagram:hover {
            opacity: 0.9;
        }
        .btn-tiktok {
            background-color: #010101;
            border: 1px solid #25f4ee;
        }
        .btn-tiktok:hover {
            background-color: #111;
            box-shadow: 0 0 15px rgba(37, 244, 238, 0.4);
        }
        .btn-email {
            background-color: #2b2b36;
            border: 1px solid #444;
        }
        .btn-email:hover {
            background-color: #3a3a4a;
        }
        
        footer {
            margin-top: 80px;
            padding: 30px;
            font-size: 0.9rem;
            color: #555;
            border-top: 1px solid #1a1a22;
        }
    </style>
</head>
<body>

    <header>
        <!-- IDE ÍRD A CSATORNÁD NEVÉT -->
        <h1>LynxCrew</h1>
        <p>Túrák, tesztek, egykerék és végtelen aszfalt. Kövess be a többi platformon is, hogy ne maradj le semmiről!</p>
        
        <div class="social-buttons">
            <!-- CSERÉLD KI A SAJÁT LINKJEIDRE -->
            <a href="https://youtube.com" target="_blank" class="btn btn-youtube">YouTube</a>
            <a href="https://instagram.com" target="_blank" class="btn btn-instagram">Instagram</a>
            <a href="https://tiktok.com" target="_blank" class="btn btn-tiktok">TikTok</a>
            <!-- A 'mailto:' után írd be a saját e-mail címedet -->
            <a href="mailto:valami@email.com" class="btn btn-email">Kapcsolat (Email)</a>
        </div>
    </header>

    <div class="container">
        <h2>A Legfrissebb Videóm</h2>
        <div class="video-container">
            <!-- IDE JÖHET A SAJÁT VIDEÓD BEÁGYAZÁSI LINKJE -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Minden jog fenntartva.</p>
    </footer>

</body>
</html>
